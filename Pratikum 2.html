<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automata FSM Checker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none; /* Hidden by default */
        }
        .accepted {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .rejected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .error {
            color: #e74c3c;
            font-size: 0.9em;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
        }
        .path-trace {
            margin-top: 15px;
            font-family: monospace;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            word-wrap: break-word;
        }
        .state-node {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FSM Automata Checker</h2>
    <p class="subtitle">Mengecek string dengan aturan: Akhiran '1' & Tanpa substring '00'</p>
    
    <div class="input-group">
        <input type="text" id="inputString" placeholder="Masukkan string biner (ex: 1011)" oninput="validateInput()">
        <button onclick="checkFSM()" id="checkBtn">Cek String</button>
    </div>
    <div id="errorMsg" class="error">Input hanya boleh berisi angka 0 dan 1!</div>

    <div id="resultBox" class="result-box">
        <h3 id="resultStatus" style="margin-top: 0;"></h3>
        <div class="path-trace">
            <strong>Jalur State:</strong> <br>
            <span id="pathOutput"></span>
        </div>
    </div>
</div>

<script>
    // validasi input 0 dan 1
    function validateInput() {
        const inputStr = document.getElementById('inputString').value;
        const errorMsg = document.getElementById('errorMsg');
        const checkBtn = document.getElementById('checkBtn');
        
        if (inputStr.length > 0 && !/^[01]+$/.test(inputStr)) {
            errorMsg.style.display = 'block';
            checkBtn.disabled = true;
            checkBtn.style.backgroundColor = '#95a5a6';
        } else {
            errorMsg.style.display = 'none';
            checkBtn.disabled = false;
            checkBtn.style.backgroundColor = '#3498db';
        }
    }

    function checkFSM() {
        const inputStr = document.getElementById('inputString').value;
        const resultBox = document.getElementById('resultBox');
        const resultStatus = document.getElementById('resultStatus');
        const pathOutput = document.getElementById('pathOutput');

        if (inputStr.length === 0) {
            alert("Harap masukkan string biner terlebih dahulu.");
            return;
        }

        let currentState = 'S';
        let path = ['S'];

        for (let i = 0; i < inputStr.length; i++) {
            let char = inputStr[i];

            if (currentState === 'S') {
                if (char === '0') currentState = 'A';
                else if (char === '1') currentState = 'B';
            } 
            else if (currentState === 'A') {
                if (char === '0') currentState = 'C';
                else if (char === '1') currentState = 'B';
            } 
            else if (currentState === 'B') {
                if (char === '0') currentState = 'A';
                else if (char === '1') currentState = 'B';
            } 
            else if (currentState === 'C') {
                currentState = 'C';
            }

            path.push(currentState);
        }

        const isAccepted = (currentState === 'B');

        resultBox.style.display = 'block';
        if (isAccepted) {
            resultBox.className = 'result-box accepted';
            resultStatus.innerText = "✅ String DITERIMA (Accepted)";
        } else {
            resultBox.className = 'result-box rejected';
            resultStatus.innerText = "❌ String DITOLAK (Rejected)";
        }

        pathOutput.innerHTML = path.map((state, index) => {
            if (index === 0) return `<span class="state-node">${state}</span>`;
            return ` &rarr; <span>(input ${inputStr[index-1]})</span> &rarr; <span class="state-node">${state}</span>`;
        }).join('');
    }
</script>

</body>
</html>
